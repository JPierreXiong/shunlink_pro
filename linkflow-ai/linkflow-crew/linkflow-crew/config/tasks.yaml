# LinkFlow AI — Task Configurations
# These are the YAML definitions consumed by CrewBase.
# Variables are injected at runtime via crew.kickoff(inputs=...).

content_preparation:
  description: >
    Prepare the article content for submission to {platform_name}.

    TARGET BACKLINK URL: {target_url}
    ANCHOR TEXT: {anchor_text}
    PLATFORM: {platform_name}

    RAW ARTICLE CONTENT:
    {article_content}

    Your job:
    1. Write or adapt the article to suit {platform_name}'s style and audience.
    2. Embed the anchor text "{anchor_text}" as a natural hyperlink to {target_url}.
       Format it as: <a href="{target_url}">{anchor_text}</a>
    3. Write a compelling, specific title (not generic).
    4. Keep body between 300-600 words.
    5. Make sure the content does NOT look like spam.

    Output a JSON object:
    {{"title": "Your Title", "body": "Full body with embedded hyperlink..."}}
  expected_output: >
    A valid JSON object with "title" (string) and "body" (string) keys.
    The body must contain the anchor text as an HTML hyperlink to the target URL.
    Body must be 300-600 words and must not look like spam.
  agent: content_specialist

backlink_submission:
  description: >
    Submit the prepared article to {platform_name} using browser automation.

    PLATFORM BASE URL: {platform_base_url}
    TASK ID: {task_id}
    SELECTOR CONFIG: {selector_config}

    SUBMISSION STEPS:
    1. navigate_browser to the login URL.
    2. fill_form_field for username and password.
    3. click_element on the login submit button.
    4. IMMEDIATELY call detect_2fa. If NEED_2FA detected, output
       "STATUS:NEED_2FA:<message>" and STOP.
    5. navigate_browser to the new post URL.
    6. fill_form_field for the title (from content_preparation output).
    7. fill_form_field for the content body.
    8. click_element on the publish button.
    9. wait_for_element on success indicator if specified in config.
    10. get_current_url to record the live backlink URL.
    11. take_screenshot with task_id.
    12. Output: "STATUS:SUCCESS|SCREENSHOT:<path>|LIVE_URL:<url>"

    SELF-HEALING: If any selector fails, call get_page_content to
    inspect available elements and choose the correct alternative selector.
  expected_output: >
    One of:
    STATUS:SUCCESS|SCREENSHOT:/tmp/linkflow_{task_id}.png|LIVE_URL:https://...
    STATUS:NEED_2FA:<description of 2FA prompt>
    STATUS:FAILED:<error description>
  agent: web_navigator


